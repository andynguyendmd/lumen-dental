name: Fetch Google Reviews

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6am UTC (1am CST)
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit reviews.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/fetch_reviews.py

      - name: Commit reviews.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --cached --quiet || git commit -m "chore: update reviews.json [skip ci]"
          git push
